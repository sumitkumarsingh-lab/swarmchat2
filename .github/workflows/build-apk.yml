name: Cloud APK Compiler

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # This forces GitHub to install Gradle 8.5 directly in the cloud
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    # This creates the missing wrapper files on the cloud runner
    - name: Generate Wrapper Files
      run: gradle wrapper

    - name: Cloud Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK for Demo Download
      uses: actions/upload-artifact@v4
      with:
        name: telco-swarm-demo-apk
        path: app/build/outputs/apk/debug/app-debug.apk