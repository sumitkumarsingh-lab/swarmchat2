name: Cloud APK Compiler

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Upgraded to JDK 21 to match modern Android Studio builds
    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    # Upgraded Gradle to 8.12 to support plugin 9.1.1
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.12'

    - name: Generate Wrapper Files
      run: gradle wrapper

    - name: Cloud Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK for Demo Download
      uses: actions/upload-artifact@v4
      with:
        name: telco-swarm-demo-apk
        path: app/build/outputs/apk/debug/app-debug.apk