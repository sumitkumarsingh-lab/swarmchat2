name: Cloud APK Compiler

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: Generate Wrapper Files
      run: gradle wrapper

    # --- NEW STEP: Automatically generate a temporary debug keystore ---
    - name: Generate Dummy Debug Keystore
      run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Cloud Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK for Demo Download
      uses: actions/upload-artifact@v4
      with:
        name: telco-swarm-demo-apk
        path: app/build/outputs/apk/debug/app-debug.apk